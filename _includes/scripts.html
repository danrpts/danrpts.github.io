<script>
  $(document).ready(function() {

    function toggleShare() {
      var $target = $('#sticky-sidebar-share');
      var top = $("#post-content").offset().top;
      if ($(window).scrollTop() > top - 25 ) {
        $target.fadeIn("fast");
      } else {
        $target.fadeOut("fast");
      }
    }

    $(window).scroll(toggleShare);

    toggleShare();

  });
</script>
