  <script id="dsq-count-scr" src="//{{ site.disqus_shortname }}.disqus.com/count.js" async></script>
{% endif %}

{% if site.google_analytics %}
  {% include google-analytics.html %}
{% endif %}
{% if site.google_search %}
  {% include google-search.html %}
{% endif %}
{% if site.google_ads %}
  {% include google-ads.html %}
{% endif %}

<script>
  $(document).ready(function () {

    // search hack
    // inspired by https://alexpearce.me/2016/02/simpler-jekyll-searching/
    var searchParams = new URLSearchParams(location.search);
    var query = searchParams.has('q') && searchParams.get('q');
    if (!query) $('[data-name]').removeClass('d-none');
    else $(`[data-name='${query}']`).removeClass('d-none');

    // starfield init
    var starfield = new Starfield({
      canvasId: 'starfield-canvas',
      warpId: 'logo'
    });
    starfield.render();

  });
</script>
