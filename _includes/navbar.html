<nav class="navbar sticky-top navbar-expand-lg navbar-light bg-light"
     data-toggle="sticky-onscroll"
     style="background-color: white !important; border-bottom: 1px solid rgba(0,0,0,.15); top: 0em;">
  <div class="container">

    <a class="navbar-brand" href="{{ "/" | relative_url }}">
      <img src="{{ "/assets/images/logo-text-small-techno.svg" | relative_url }}" width="30" height="30" alt="">
    </a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarToggler" aria-controls="navbarToggler" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarToggler">

      <ul class="navbar-nav mr-auto">
        {% if page.url | split:'page' | first == "/" }} %}
        {% if paginator.previous_page %}
        <li class="nav-item mr-2 my-2 my-lg-0">
          <a class="btn btn-outline-primary" role="button" href="{{ paginator.previous_page_path | relative_url }}">Previous Page</a>
        </li>
        {% endif %}
        {% if paginator.next_page %}
        <li class="nav-item mr-2 my-2 my-lg-0">
          <a class="btn btn-outline-primary" role="button" href="{{ paginator.next_page_path | relative_url }}">Next Page</a>
        </li>
        {% endif %}
        {% endif %}

        {% if page.id  %}
        <li class="nav-item mr-2 my-2 my-lg-0">
          <button type="button" class="btn btn-outline-primary">
            More
          </button>
        </li>
        <li class="nav-item mr-2 my-2 my-lg-0">
          <button type="button" class="btn btn-outline-primary" data-toggle="modal" data-target="#shareModal">
            Share <i class="fa fa-share-alt" aria-hidden="true"></i>
          </button>
        </li>
        {% endif %}
      </ul>

      <form class="form-inline my-2 my-lg-0">
        <div class="form-group">
          <div class="input-group">
            <input class="form-control lead" type="text" placeholder="Search anything ..." name="q" aria-label="Search">
            <span class="input-group-btn">
              <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Go!</button>
            </span>
          </div>
        </div>
      </form>

    </div>
  </div>
</nav>
